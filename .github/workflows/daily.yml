name: Falco Daily Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"  # runs daily at 12:00 UTC (7am CST)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      # === REQUIRED SECRETS ===
      FALCO_ATTOM_API_KEY: ${{ secrets.FALCO_ATTOM_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      # === DEBUG (TEMPORARY) ===
      FALCO_ENRICH_DEBUG: "1"

      # === CONTROL VARS ===
      FALCO_MAX_ENRICH_PER_RUN: "40"
      FALCO_MAX_COMPS_PER_RUN: "12"
      FALCO_COMPS_RADIUS_MILES: "1.0"
      FALCO_COMPS_LOOKBACK_DAYS: "180"
      FALCO_TIER2_MIN_EQUITY_PCT: "0.15"
      FALCO_TIER2_MIN_AVM_CONF: "60"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Falco pipeline
        run: python -m src.run_all
