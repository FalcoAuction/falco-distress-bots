name: Falco Daily Pipeline

on:
  workflow_dispatch:
  schedule:
    # Twice daily — early-morning and mid-afternoon. Two passes/day keeps
    # the dialer queue fresh AND gives us a recovery window if the first
    # run hits a transient source-site hiccup.
    - cron: "0 12 * * *"  # 12:00 UTC = 7am CST — primary daily pass
    - cron: "0 21 * * *"  # 21:00 UTC = 4pm CST — afternoon refresh

# Don't cancel an in-progress run when a new one is queued; let the
# earlier one complete and just queue the next. Previously concurrent
# crons (May 3, May 4) auto-cancelled each other.
concurrency:
  group: falco-daily-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      # ===== Bot scrapers (write directly to Supabase) =====
      # Bots ingest leads from public sources and upsert into the
      # falco-site Supabase homeowner_requests table. The dialer + /admin
      # read this live. Notion was removed 2026-04-29.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ===== Optional enrichment APIs (currently unused in CI) =====
      # Stage 2/3 enrichment is gated off by default; runs via Vercel cron
      # at /api/cron/refresh-dialer. Set FALCO_ENABLE_LEGACY_STAGES=1 to
      # opt back in to running them here.
      FALCO_BATCHDATA_API_KEY: ${{ secrets.FALCO_BATCHDATA_API_KEY }}
      FALCO_ATTOM_API_KEY: ${{ secrets.FALCO_ATTOM_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Falco pipeline (bot scrapers \u2192 Supabase)
        run: python -m src.run_all
        continue-on-error: true   # don't let legacy bots block new ones

      - name: Run NEW staging scrapers (\u2192 homeowner_requests_staging)
        # The new framework writes to a staging table for review at
        # /admin/staging before promotion. Each scraper inherits health
        # monitoring from BotBase \u2014 silent failures get caught in
        # bot_run_health.
        run: python -m src.bots._run_new
        continue-on-error: true

      - name: Upload run status artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: falco-daily-status-${{ github.run_id }}
          path: |
            out/reports/latest_run_status.json
            out/reports/latest_run_summary.json
            out/reports/conversion_lane.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Post-run summary (queries bot_run_health for last 24h)
        if: always()
        run: |
          python -c "
          import os, urllib.request, json
          url = os.environ['NEXT_PUBLIC_SUPABASE_URL'].rstrip('/') + '/rest/v1/bot_run_health?select=bot_source,status,fetched_count,staged_count,started_at,error_message&order=started_at.desc&limit=30'
          req = urllib.request.Request(url, headers={
              'apikey': os.environ['SUPABASE_SERVICE_ROLE_KEY'],
              'Authorization': 'Bearer ' + os.environ['SUPABASE_SERVICE_ROLE_KEY'],
          })
          rows = json.loads(urllib.request.urlopen(req, timeout=15).read())
          print('=== Last 30 bot runs ===')
          for r in rows:
              when = (r.get('started_at') or '')[:16].replace('T',' ')
              print(f\"  {when}  {r.get('bot_source','?'):>30}  {r.get('status','?'):>14}  fetched={r.get('fetched_count') or 0:>5}  staged={r.get('staged_count') or 0:>5}  {(r.get('error_message') or '')[:60]}\")
          " || true
