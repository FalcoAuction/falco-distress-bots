name: Falco Daily Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"  # daily at 12:00 UTC (7am CST)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      # REQUIRED SECRETS
      FALCO_ATTOM_API_KEY: ${{ secrets.FALCO_ATTOM_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      # DEBUG (TEMP during buildout)
      FALCO_ENRICH_DEBUG: "1"

      # COST CONTROL DURING TESTING
      FALCO_MAX_ENRICH_PER_RUN: "10"
      FALCO_ENRICH_NO_RESULT_COOLDOWN_HOURS: "72"

      # existing knobs (fine to keep)
      FALCO_MAX_COMPS_PER_RUN: "6"
      FALCO_COMPS_RADIUS_MILES: "1.0"
      FALCO_COMPS_LOOKBACK_DAYS: "180"
      FALCO_TIER2_MIN_EQUITY_PCT: "0.15"
      FALCO_TIER2_MIN_AVM_CONF: "60"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Falco pipeline
        run: python -m src.run_all

      # NOTE: site_sync.py is intentionally NOT run here in CI.
      # The bot pipeline doesn't persist SQLite state across CI runs
      # (data/falco.db is local-dev only), so there's nothing for the
      # sync to read. Patrick runs `python -m src.sync.site_sync` locally
      # after his local pipeline run, same pattern as sync_to_vault.py.

      - name: Upload run status artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: falco-daily-status
          path: |
            out/reports/latest_run_status.json
            out/reports/latest_run_summary.json
            out/reports/conversion_lane.json
          if-no-files-found: ignore
